name: CI — Build & Test

# Trigger: chạy khi push hoặc tạo PR vào main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Cài .NET SDK ─────────────────────────
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ── 3. Cache NuGet packages ─────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      # ── 4. Restore dependencies ─────────────────
      - name: Restore dependencies
        run: dotnet restore TlearnBE/TLearnBe.sln

      # ── 5. Build ────────────────────────────────
      - name: Build
        run: dotnet build TlearnBE/TLearnBe.sln --no-restore -c Release 

      # ── 6. Run tests ────────────────────────────
      - name: Run tests
        run: dotnet test TlearnBE/TLearnBe.sln --no-build -c Release --verbosity normal

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test  # chỉ chạy nếu job trên pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-api:${{ github.sha }} .
